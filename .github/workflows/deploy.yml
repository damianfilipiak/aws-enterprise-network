name: Deploy AWS Infrastructure & Active Directory

on:
  push:
    branches:
      - main # Trigger pipeline automatically on git push to main
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    name: Terraform & Ansible Provisioning
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      # 1. Get code from project repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login to AWS using GitHub Secrets (OIDC Auth)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      # 3. Setup SSH Key for Terraform and SSM Tunnel
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub

      # 4. Install and configure Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # 5. Build Base Infrastructure (Stage 1 - without AD Connector)
      - name: Terraform Init & Apply (Base Infrastructure)
        run: |
          cd terraform
          terraform init
          terraform force-unlock -force bd5c35e9-e48c-0b72-68fc-481355941f88
          terraform apply -auto-approve

      # 6. Install AWS Session Manager Plugin for Zero Trust Tunnel
      - name: Install AWS Session Manager Plugin
        run: |
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb
          rm session-manager-plugin.deb

      # 7. Wait for the AD server's SSM Agent to actually report "Online"
      - name: Wait for SSM Agent to report Online
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=Samba4-AD-DC" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          echo "Waiting for SSM agent on $INSTANCE_ID ..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null || echo "None")
            if [ "$STATUS" == "Online" ]; then
              echo "SSM agent is Online."
              exit 0
            fi
            echo "  ($i/30) status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "SSM agent never came Online after 5 minutes - failing fast."
          exit 1

      # 8. Install Ansible and execute Playbook via SSM (Installs Samba and creates aws-svc account)
      - name: Install Ansible & Configure Samba AD
        run: |
          sudo /opt/pipx/venvs/ansible-core/bin/python -m pip install boto3 botocore
          ansible-galaxy collection install amazon.aws

          # Run playbook via native SSM plugin
          cd ansible
          ansible-playbook -i inventory/inventory.ini playbook_ad.yml

      # 9. Build AWS AD Connector (Stage 2 - after Samba is fully operational)
      - name: Terraform Apply (Deploy AD Connector)
        run: |
          cd terraform
          terraform apply -var="deploy_ad_connector=true" -auto-approve