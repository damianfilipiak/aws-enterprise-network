---
- name: Install and configure Samba4 AD DC
  hosts: ad
  become: yes
  vars:
    domain_realm: "ls.ege.ds"
    domain_netbios: "LS"

  tasks:
    - name: Update apt and install required packages
      apt:
        name:
          - samba
          - smbclient
          - winbind
          - libnss-winbind
          - krb5-user
          - krb5-config
          - awscli
          - bind9
          - bind9utils
          - dnsutils
        state: present
        update_cache: yes
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Remove default smb.conf file (so AD can generate its own)
      file:
        path: /etc/samba/smb.conf
        state: absent

    
    - name: Get AD passwd from AWS Secrets Manager
      command: >
        aws secretsmanager get-secret-value
        --secret-id "enterprise/ad/admin-password"
        --query "SecretString"
        --output text
        --region eu-central-1
      register: ad_password_raw
      changed_when: false
      no_log: true  

    - name: Set var with passwd
      set_fact:
        ad_admin_password: "{{ ad_password_raw.stdout }}"
      no_log: true 

    - name: Provision domain (create new Active Directory domain)
      shell: >
        samba-tool domain provision 
        --server-role=dc 
        --use-rfc2307 
        --dns-backend=SAMBA_INTERNAL 
        --realm={{ domain_realm | upper }} 
        --domain={{ domain_netbios }} 
        --adminpass='{{ ad_admin_password }}' 
      args:
        creates: /etc/samba/smb.conf

    - name: Disable standard Samba services (conflict with AD DC version)
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
        masked: yes
      loop:
        - smbd
        - nmbd
        - winbind

    - name: Start integrated Samba AD DC service
      systemd:
        name: samba-ad-dc
        state: started
        enabled: yes
        masked: no

    - name: Configure BIND9 DNS service for the AD domain
      block:
        - name: Create BIND9 options config
          copy:
            dest: /etc/bind/named.conf.options
            content: |
              options {
                  directory "/var/cache/bind";
                  listen-on { any; };
                  listen-on-v6 { any; };
                  allow-query { any; };
                  recursion yes;
                  forwarders { 1.1.1.1; 8.8.8.8; };
                  dnssec-validation no;
                  auth-nxdomain no;
                  listen-on-v6 { any; };
              };
            mode: '0644'

        - name: Ensure BIND9 zone directory exists
          file:
            path: /etc/bind/zones
            state: directory
            mode: '0755'

        - name: Create BIND9 local zone config
          copy:
            dest: /etc/bind/named.conf.local
            content: |
              zone "ls.ege.ds" {
                  type master;
                  file "/etc/bind/zones/db.ls.ege.ds";
              };

              zone "30.128.10.in-addr.arpa" {
                  type master;
                  file "/etc/bind/zones/db.10.128.30";
              };
            mode: '0644'

        - name: Create forward DNS zone file
          copy:
            dest: /etc/bind/zones/db.ls.ege.ds
            content: |
              $TTL 3600
              @ IN SOA dc.ls.ege.ds. hostmaster.ls.ege.ds. (
                2026072001 3600 600 86400 3600 )
              @ IN NS dc.ls.ege.ds.
              @ IN A 10.128.30.10
              dc IN A 10.128.30.10
            mode: '0644'

        - name: Create reverse DNS zone file
          copy:
            dest: /etc/bind/zones/db.10.128.30
            content: |
              $TTL 3600
              @ IN SOA dc.ls.ege.ds. hostmaster.ls.ege.ds. (
                2026072001 3600 600 86400 3600 )
              @ IN NS dc.ls.ege.ds.
              10 IN PTR dc.ls.ege.ds.
            mode: '0644'

        - name: Validate BIND9 configuration
          command: named-checkconf
          changed_when: false

        - name: Force BIND9 restart and enable it
          systemd:
            name: bind9
            state: restarted
            enabled: yes

        - name: Ensure named is listening on port 53
          shell: |
            set -e
            systemctl restart bind9 || true
            sleep 10
            ss -ltnp | grep ':53' || true
            host ls.ege.ds 127.0.0.1 || true
          changed_when: false

    - name: Check Samba AD DC service status
      systemd:
        name: samba-ad-dc
        state: started
      register: ad_dc_status
      ignore_errors: true

    - name: Wait briefly for Samba AD DC and DNS to finish startup
      pause:
        seconds: 60

    - name: Verify that the AD DNS name resolves locally
      command: host {{ domain_realm }} 127.0.0.1
      register: dns_check
      changed_when: false
      ignore_errors: true

    - name: Wait for key AD DC ports to become reachable
      wait_for:
        host: "127.0.0.1"
        port: "{{ item }}"
        delay: 5
        timeout: 600
        state: started
      loop:
        - 389
        - 88
        - 464
      ignore_errors: true

    # SERVICES ACC AWS
    - name: Get passwd for serv acc from AWS Secrets Manager
      command: >
        aws secretsmanager get-secret-value
        --secret-id "enterprise/ad/connector-password"
        --query "SecretString"
        --output text
        --region eu-central-1
      register: connector_password_raw
      changed_when: false
      no_log: true

    - name: Set var passwd
      set_fact:
        connector_password: "{{ connector_password_raw.stdout }}"
      no_log: true

    - name: Check if acc aws-svc is create
      command: samba-tool user list
      register: existing_users
      changed_when: false

    - name: Create acc aws-svc
      command: >
        samba-tool user create aws-svc '{{ connector_password }}' 
        --description="AWS AD Connector Service Account"
      when: "'aws-svc' not in existing_users.stdout"
      no_log: true

    - name: Turn-off passwd expires for aws-svc
      command: samba-tool user setexpiry aws-svc --noexpiry
      when: "'aws-svc' not in existing_users.stdout"