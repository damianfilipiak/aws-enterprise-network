---
- name: Install and configure Samba4 AD DC
  hosts: ad
  become: yes
  vars:
    domain_realm: "ls.ege.ds"
    domain_netbios: "LS"
    vault_admin_pass: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          39323533353130303664653937373165633436616138626134636139373336303861383261643764
          6437346339333361333765653965666332653835636464320a316563353833326430613235643765
          33643263356132363237653363643930373430353464346333386635303066316138316235356130
          3931653130626664340a303339373935636166323166636431623931613362613239313735373966
          3866

  tasks:
    - name: Update apt and install required packages
      apt:
        name:
          - samba
          - smbclient
          - winbind
          - libnss-winbind
          - krb5-user
          - krb5-config
        state: present
        update_cache: yes

    - name: Remove default smb.conf file (so AD can generate its own)
      file:
        path: /etc/samba/smb.conf
        state: absent

    - name: Provision domain (create new Active Directory domain)
      shell: >
        samba-tool domain provision 
        --server-role=dc 
        --use-rfc2307 
        --dns-backend=SAMBA_INTERNAL 
        --realm={{ domain_realm | upper }} 
        --domain={{ domain_netbios }} 
        --adminpass='{{ vault_admin_pass }}'
      args:
        creates: /etc/samba/smb.conf

    - name: Disable standard Samba services (conflict with AD DC version)
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
        masked: yes
      loop:
        - smbd
        - nmbd
        - winbind

    - name: Start integrated Samba AD DC service
      systemd:
        name: samba-ad-dc
        state: started
        enabled: yes
        masked: no
