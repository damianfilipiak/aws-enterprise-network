---
- name: Install and configure Samba4 AD DC
  hosts: ad
  become: yes
  vars:
    domain_realm: "ls.ege.ds"
    domain_netbios: "LS"

  tasks:
    - name: Update apt and install required packages
      apt:
        name:
          - samba
          - smbclient
          - winbind
          - libnss-winbind
          - krb5-user
          - krb5-config
          - awscli 
        state: present
        update_cache: yes
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Remove default smb.conf file (so AD can generate its own)
      file:
        path: /etc/samba/smb.conf
        state: absent

    
    - name: Get AD passwd from AWS Secrets Manager
      command: >
        aws secretsmanager get-secret-value
        --secret-id "enterprise/ad/admin-password"
        --query "SecretString"
        --output text
        --region eu-central-1
      register: ad_password_raw
      changed_when: false
      no_log: true  

    - name: Set var with passwd
      set_fact:
        ad_admin_password: "{{ ad_password_raw.stdout }}"
      no_log: true 

    - name: Provision domain (create new Active Directory domain)
      shell: >
        samba-tool domain provision 
        --server-role=dc 
        --use-rfc2307 
        --dns-backend=SAMBA_INTERNAL 
        --realm={{ domain_realm | upper }} 
        --domain={{ domain_netbios }} 
        --adminpass='{{ ad_admin_password }}' 
      args:
        creates: /etc/samba/smb.conf

    - name: Disable standard Samba services (conflict with AD DC version)
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
        masked: yes
      loop:
        - smbd
        - nmbd
        - winbind

    - name: Start integrated Samba AD DC service
      systemd:
        name: samba-ad-dc
        state: started
        enabled: yes
        masked: no

    - name: Wait for Samba AD DC ports to become reachable
      wait_for:
        host: "127.0.0.1"
        port: "{{ item }}"
        delay: 5
        timeout: 600
        state: started
      loop:
        - 53
        - 389
        - 88
        - 464
      ignore_errors: true

    # SERVICES ACC AWS
    - name: Get passwd for serv acc from AWS Secrets Manager
      command: >
        aws secretsmanager get-secret-value
        --secret-id "enterprise/ad/connector-password"
        --query "SecretString"
        --output text
        --region eu-central-1
      register: connector_password_raw
      changed_when: false
      no_log: true

    - name: Set var passwd
      set_fact:
        connector_password: "{{ connector_password_raw.stdout }}"
      no_log: true

    - name: Check if acc aws-svc is create
      command: samba-tool user list
      register: existing_users
      changed_when: false

    - name: Create acc aws-svc
      command: >
        samba-tool user create aws-svc '{{ connector_password }}' 
        --description="AWS AD Connector Service Account"
      when: "'aws-svc' not in existing_users.stdout"
      no_log: true

    - name: Turn-off passwd expires for aws-svc
      command: samba-tool user setexpiry aws-svc --noexpiry
      when: "'aws-svc' not in existing_users.stdout"